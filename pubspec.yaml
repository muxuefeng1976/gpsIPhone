name: gps_iphone
description: GPS实时追踪上传 App - iPhone 6s
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 定位
  geolocator: ^10.1.0

  # HTTP 请求
  http: ^1.1.0

  # 权限管理
  permission_handler: ^11.3.0

  # 设备信息
  device_info_plus: ^9.1.2

  # 本地存储（持久化设备ID）
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
