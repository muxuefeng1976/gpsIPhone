# Codemagic 构建配置 - iPhone 6s (iOS 15.8)
# 构建未签名 IPA，用 Sideloadly 签名安装

workflows:
  ios-build:
    name: iOS Build for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Generate iOS project
        script: |
          set -e
          mkdir -p /tmp/ios_bak

          # 仅备份用户自定义文件（Podfile 和 AppFrameworkInfo.plist 由 flutter create 生成）
          cp ios/Runner/Info.plist /tmp/ios_bak/
          cp ios/Runner/AppDelegate.swift /tmp/ios_bak/
          cp ios/Runner/Base.lproj/LaunchScreen.storyboard /tmp/ios_bak/
          cp ios/Runner/Base.lproj/Main.storyboard /tmp/ios_bak/
          cp ios/exportOptions.plist /tmp/ios_bak/

          rm -rf ios
          flutter create . --platforms ios --no-pub

          # 恢复自定义文件
          cp /tmp/ios_bak/Info.plist ios/Runner/Info.plist
          cp /tmp/ios_bak/AppDelegate.swift ios/Runner/AppDelegate.swift
          cp /tmp/ios_bak/LaunchScreen.storyboard ios/Runner/Base.lproj/LaunchScreen.storyboard
          cp /tmp/ios_bak/Main.storyboard ios/Runner/Base.lproj/Main.storyboard
          cp /tmp/ios_bak/exportOptions.plist ios/exportOptions.plist

          # 给 flutter create 生成的标准 Podfile 添加 iPhone 6s 兼容设置
          ruby -e 'f=File.read("ios/Podfile"); f.sub!(/(\s+)flutter_additional_ios_build_settings\(target\)\n\1end/) { "#{$1}flutter_additional_ios_build_settings(target)\n#{$1}target.build_configurations.each do |config|\n#{$1}  config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"12.0\"\n#{$1}  config.build_settings[\"EXCLUDED_ARCHS[sdk=iphonesimulator*]\"] = \"i386\"\n#{$1}  config.build_settings[\"ARCHS\"] = \"arm64\"\n#{$1}end\n#{$1}end" }; File.write("ios/Podfile", f)' || echo "Podfile patch skipped"

      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Build IPA (unsigned)
        script: |
          flutter build ios --release --no-codesign

          # 查找生成的 .app 包
          APP_DIR=$(find build/ios -maxdepth 2 -name "*.app" -type d | head -n 1)
          echo "Found app bundle: $APP_DIR"

          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No .app bundle found in build/ios"
            find build/ios -type d
            exit 1
          fi

          if [ ! -f "$APP_DIR/Info.plist" ]; then
            echo "ERROR: Info.plist not found in $APP_DIR"
            ls -la "$APP_DIR"
            exit 1
          fi

          # 用 ditto 复制 .app，保留 bundle 结构和资源叉（比 cp -r 更适合 macOS）
          rm -rf Payload build/ios/ipa
          mkdir -p build/ios/ipa
          mkdir Payload
          ditto "$APP_DIR" "Payload/$(basename "$APP_DIR")"

          echo "Payload contents:"
          ls -la Payload/
          find Payload -maxdepth 2 -type f | head -20

          # 打包成 IPA（确保 zip 根目录是 Payload）
          zip -r build/ios/ipa/gps_iphone.ipa Payload
          rm -rf Payload

          echo "Final IPA contents:"
          unzip -l build/ios/ipa/gps_iphone.ipa | head -30

    artifacts:
      - build/ios/ipa/gps_iphone.ipa
