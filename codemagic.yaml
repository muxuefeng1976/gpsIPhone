# Codemagic iOS 构建配置 - iPhone 6s (iOS 15.8.8)
# 用免费 Apple ID 签名，不需要付费开发者账号

workflows:
  ios-build:
    name: iOS Build for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: 15.4
      ios_signing:
        distribution_type: development
        bundle_identifier: com.muxuefeng.gpsiphone
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Build iOS
        script: flutter build ipa --release --export-options-plist ios/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
