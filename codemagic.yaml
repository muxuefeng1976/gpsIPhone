# Codemagic 构建配置 - iPhone 6s (iOS 15.8)
# 构建未签名 IPA，用 Sideloadly 签名安装

workflows:
  ios-build:
    name: iOS Build for iPhone
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: 15.4
    scripts:
      - name: Generate iOS project
        script: |
          set -e
          mkdir -p /tmp/ios_bak
          cp ios/Runner/Info.plist /tmp/ios_bak/Info.plist.bak
          cp ios/Podfile /tmp/ios_bak/Podfile.bak
          cp ios/Runner/AppDelegate.swift /tmp/ios_bak/AppDelegate.swift.bak
          cp ios/Runner/Base.lproj/LaunchScreen.storyboard /tmp/ios_bak/LaunchScreen.storyboard.bak
          cp ios/Runner/Base.lproj/Main.storyboard /tmp/ios_bak/Main.storyboard.bak
          cp ios/Flutter/AppFrameworkInfo.plist /tmp/ios_bak/AppFrameworkInfo.plist.bak
          cp ios/exportOptions.plist /tmp/ios_bak/exportOptions.plist.bak

          rm -rf ios
          flutter create . --platforms ios --no-pub

          cp /tmp/ios_bak/Info.plist.bak ios/Runner/Info.plist
          cp /tmp/ios_bak/Podfile.bak ios/Podfile
          cp /tmp/ios_bak/AppDelegate.swift.bak ios/Runner/AppDelegate.swift
          cp /tmp/ios_bak/LaunchScreen.storyboard.bak ios/Runner/Base.lproj/LaunchScreen.storyboard
          cp /tmp/ios_bak/Main.storyboard.bak ios/Runner/Base.lproj/Main.storyboard
          cp /tmp/ios_bak/AppFrameworkInfo.plist.bak ios/Flutter/AppFrameworkInfo.plist
          cp /tmp/ios_bak/exportOptions.plist.bak ios/exportOptions.plist

      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Build IPA (unsigned)
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          mkdir Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r build/ios/ipa/gps_iphone.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/ipa/gps_iphone.ipa
